<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{document_title}} № {{document_number}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      color: #111;
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1.15;
      margin: 14mm 16mm;
      position: relative;
    }
    .print-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .print-actions button {
      background: #111;
      border: 0;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
    }
    .page {
      margin: 0 auto;
      max-width: 184mm;
      min-height: 120mm;
      position: relative;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
      margin: 0 0 16px;
      text-align: center;
    }
    .top-fields {
      display: grid;
      gap: 3px;
      grid-template-columns: 1fr;
      margin-bottom: 4px;
      width: 100%;
    }
    .line {
      align-items: baseline;
      display: grid;
      gap: 6px;
      grid-template-columns: max-content 1fr;
      min-height: 16px;
    }
    .line.double {
      grid-template-columns: max-content 1fr max-content 90px max-content 1fr;
    }
    .label { white-space: nowrap; }
    .value {
      border-bottom: 1px solid transparent;
      min-height: 14px;
      overflow: hidden;
      white-space: nowrap;
    }
    table {
      border-collapse: collapse;
      margin-top: 4px;
      width: 100%;
    }
    th,
    td {
      border: 1px solid #222;
      font-size: 11px;
      padding: 1px 4px;
      vertical-align: top;
    }
    th {
      font-weight: 700;
      text-align: center;
    }
    .center { text-align: center; }
    .num {
      text-align: right;
      white-space: nowrap;
    }
    .strong { font-weight: 700; }
    .empty {
      color: #555;
      text-align: center;
    }
    .totals {
      display: grid;
      grid-template-columns: 1fr 120px;
      margin-top: 3px;
    }
    .total-label {
      font-size: 12px;
      font-style: italic;
      font-weight: 700;
      padding-left: 72px;
    }
    .total-value {
      font-weight: 700;
      text-align: right;
    }
    .amount-words {
      font-size: 12px;
      margin-left: 76px;
      margin-top: 4px;
    }
    .signatures {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin-top: 62px;
      padding: 0 42px;
    }
    .signature {
      align-items: baseline;
      display: grid;
      gap: 6px;
      grid-template-columns: max-content 1fr;
    }
    .signature-line {
      border-bottom: 1px solid #111;
      height: 14px;
    }
    .watermark {
      border: 2px solid #777;
      color: #777;
      font-size: 30px;
      font-weight: 700;
      left: 50%;
      letter-spacing: 6px;
      opacity: .12;
      padding: 8px 20px;
      position: fixed;
      top: 44%;
      transform: translate(-50%, -50%) rotate(-18deg);
      z-index: 0;
    }
    .watermark.danger {
      border-color: #900;
      color: #900;
    }
    .content { position: relative; z-index: 1; }
    @page { margin: 14mm 16mm; size: A4; }
    @media print {
      body { margin: 0; }
      .print-actions { display: none; }
    }
  </style>
</head>
<body>
  {{watermark}}
  <div class="print-actions">
    <button onclick="window.print()">&#1055;&#1077;&#1095;&#1072;&#1090;&#1100;</button>
  </div>

  <div class="page content">
    <h1>{{document_title}} № {{document_number}}</h1>

    <div class="top-fields">
      <div class="line">
        <span class="label">&#1044;&#1072;&#1090;&#1072;:</span>
        <span class="value">{{document_date}}</span>
      </div>
      <div class="line">
        <span class="label">&#1055;&#1086;&#1089;&#1090;&#1072;&#1074;&#1097;&#1080;&#1082;:</span>
        <span class="value">{{supplier_name}}</span>
      </div>
      <div class="line double">
        <span class="label">&#1055;&#1086;&#1082;&#1091;&#1087;&#1072;&#1090;&#1077;&#1083;&#1100;:</span>
        <span class="value">{{buyer_name}}</span>
        <span class="label">&#1044;&#1086;&#1074;&#1077;&#1088;&#1077;&#1085;&#1085;&#1086;&#1089;&#1090;&#1100; №:</span>
        <span class="value"></span>
        <span class="label">&#1086;&#1090;:</span>
        <span class="value"></span>
      </div>
      <div class="line">
        <span class="label">&#1054;&#1090;&#1087;&#1091;&#1097;&#1077;&#1085;&#1086;:</span>
        <span class="value">{{note}}</span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 28px;">№</th>
          <th style="width: 70px;">&#1050;&#1086;&#1076;</th>
          <th>&#1058;&#1086;&#1074;&#1072;&#1088;</th>
          <th style="width: 36px;">&#1045;&#1076;.</th>
          <th style="width: 48px;">&#1050;&#1086;&#1083;.</th>
          <th style="width: 70px;">&#1062;&#1077;&#1085;&#1072;</th>
          <th style="width: 78px;">&#1057;&#1091;&#1084;&#1084;&#1072;</th>
        </tr>
      </thead>
      <tbody>
        {{line_rows}}
      </tbody>
    </table>

    <div class="totals">
      <div class="total-label">&#1048;&#1090;&#1086;&#1075;&#1086;:</div>
      <div class="total-value">{{total_amount}}</div>
    </div>
    <div class="amount-words">{{amount_words}}</div>

    <div class="signatures">
      <div class="signature">
        <span>&#1054;&#1090;&#1087;&#1091;&#1089;&#1090;&#1080;&#1083;</span>
        <span class="signature-line"></span>
      </div>
      <div class="signature">
        <span>&#1055;&#1086;&#1083;&#1091;&#1095;&#1080;&#1083;</span>
        <span class="signature-line"></span>
      </div>
    </div>
  </div>
</body>
</html>
